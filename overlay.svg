/* جایگزین مدرن و بدون ارور برای overlay.svg */
.cinematic-texture {
    position: fixed;
    inset: 0;
    /* ساخت پترن خط‌خطی دیجیتالی مینی‌مال با کد مچ شده به رفرنس‌ها */
    background-image: linear-gradient(rgba(0, 0, 0, 0.3) 50%, transparent 50%);
    background-size: 100% 4px;
    pointer-events: none;
    z-index: 9999;
    opacity: 0.35;
}

/* ایجاد هاله عمیق تاریک ومپایری دور صفحه */
.cinematic-vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, transparent 40%, #030001 95%);
    pointer-events: none;
    z-index: 9998;
}
