<!-- بخش گاراژ در HTML -->
<div class="web-section" id="forza-sec">
    <h2>گاراژ رویایی مبین</h2>
    <!-- دقت کن: این بار به جای id، از class استفاده می‌کنیم برای اطمینان -->
    <img id="porsche" src="" alt="Porsche" style="width: 100%; max-width: 600px; display: block; border-radius: 20px;">
</div>

<script>
  // ... (همون کد قبلی تنظیمات فایربیس و اینیشیالایز) ...

  const db = firebase.firestore();
  
  db.collection("website_data").doc("config").get().then((doc) => {
      if (doc.exists) {
          const data = doc.data();
          const img = document.getElementById("porsche");
          if(img && data.porsche_image_url) {
              img.src = data.porsche_image_url;
              console.log("عکس با موفقیت ست شد:", data.porsche_image_url);
          }
      } else {
          console.log("داکیومنت پیدا نشد!");
      }
  }).catch((e) => console.error("ارور نهایی: ", e));
</script>
