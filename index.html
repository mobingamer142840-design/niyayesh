<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobin & Niyayesh</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Vazirmatn';
background:#000;
overflow:hidden;
height:100vh;
color:white;
}

/* BACKGROUND */
.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at center,#3b0000 0%,#000 70%);
z-index:-2;
}

/* FOG */
.fog{
position:fixed;
inset:0;
background:url('https://i.imgur.com/3ZQ3ZQZ.png');
opacity:.04;
animation:move 30s linear infinite;
z-index:-1;
}

@keyframes move{
from{transform:translateX(0)}
to{transform:translateX(-300px)}
}

/* LOGIN */
.login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:340px;
padding:35px;
background:rgba(0,0,0,.75);
border-radius:24px;
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 80px rgba(255,0,0,.25);
}

.login h1{
font-family:'Cinzel';
color:#ff2b2b;
}

input{
width:100%;
padding:14px;
margin:15px 0;
border:none;
border-radius:12px;
background:#120707;
color:white;
outline:none;
}

input::placeholder{
color:rgba(255,255,255,.5);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#7a0000;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff0000;
transform:scale(1.03);
}

/* MAIN */
#main{
display:none;
height:100vh;
overflow-y:auto;
padding:60px 20px;
}

.letter{
max-width:900px;
margin:auto;
padding:50px;
border-radius:30px;
background:rgba(10,0,0,.75);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
box-shadow:0 0 120px rgba(255,0,0,.25);
animation:open 2s ease;
}

@keyframes open{
from{opacity:0;transform:scale(.9);filter:blur(10px)}
to{opacity:1;transform:scale(1);filter:blur(0)}
}

.title{
font-family:'Cinzel';
font-size:3rem;
text-align:center;
color:#ff3b3b;
margin-bottom:25px;
text-shadow:0 0 30px rgba(255,0,0,.4);
}

/* GALLERY */
.gallery{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:30px;
}

.gallery img{
width:180px;
height:220px;
object-fit:cover;
border-radius:18px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 40px rgba(255,0,0,.3);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08);
filter:brightness(1.2);
}

/* TEXT */
.text{
font-size:1.2rem;
line-height:2.7;
text-shadow:0 0 10px rgba(255,0,0,.2);
}

/* MUSIC */
.music{
margin-top:40px;
text-align:center;
}

iframe{
width:100%;
max-width:600px;
height:166px;
border-radius:16px;
box-shadow:0 0 40px rgba(255,0,0,.25);
border:none;
}

/* BLOOD */
.blood{
position:fixed;
top:-20px;
width:2px;
height:120px;
background:linear-gradient(to bottom,#ff0000,transparent);
animation:fall linear infinite;
opacity:.35;
}

@keyframes fall{
to{transform:translateY(120vh)}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>

<!-- LOGIN -->
<div class="login" id="login">
<h1>Niyayesh 🥹🫂💕</h1>
<p>Only love knows the password</p>

<input id="pass" type="password" placeholder="type password...">
<button onclick="enter()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">
<div class="letter">

<div class="title">For Niyayesh 🥹🫂💕</div>

<div class="gallery">
<img src="https://i.ibb.co/B2JypFvQ/376-D4-ACC-3-DEE-4-E58-83-B7-03-D9-DC211-FB5.png">
<img src="https://i.ibb.co/qMknX2zw/F84202-ED-5840-473-A-984-D-DE4259-D4-BB25.png">
</div>

<div class="text">
نیایش…<br><br>

تو فقط عشق من نیستی.<br>
تو دلیل نفس کشیدن منی.<br><br>

اگر دنیا هزار بار دیگر ساخته شود…<br>
باز هم تو را انتخاب می‌کنم.<br><br>

تو خانه‌ی منی… همیشه.
</div>

<div class="music">
<iframe 
src="https://www.youtube.com/embed/GCdwKhTtNNw?autoplay=1&mute=1"
allow="autoplay">
</iframe>
</div>

</div>
</div>

<script>
function enter(){
let p=document.getElementById("pass").value;

if(p==="mobinloveniyayesh"){

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

/* blood */
for(let i=0;i<50;i++){
let b=document.createElement("div");
b.className="blood";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(2+Math.random()*4)+"s";
document.body.appendChild(b);
}

}else{
alert("Wrong password...");
}
}
</script>

</body>
</html>
