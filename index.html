<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiriper Messenger</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dark:#8b6914;
  --bg-0:#0d0a1a; --bg-1:#15102a; --bg-2:#1f1740; --bg-3:#2a1f55;
  --panel:rgba(26,16,53,.92); --line:rgba(201,168,76,.18);
  --txt:#ece6d6; --muted:#9c93b5; --danger:#ff6b6b; --ok:#4caf78;
  --font:'Vazirmatn',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg-0);color:var(--txt);overflow:hidden}
button{font-family:var(--font);cursor:pointer}
input,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:7px;height:7px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-dark);border-radius:4px}
#authScreen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at top,var(--bg-2) 0%,var(--bg-0) 70%);padding:20px;z-index:50}
.auth-box{width:100%;max-width:380px;background:var(--panel);border:1px solid var(--gold);border-radius:20px;padding:34px 28px;backdrop-filter:blur(16px);box-shadow:0 0 40px rgba(201,168,76,.15)}
.auth-logo{font-size:3rem;text-align:center}
.auth-box h1{text-align:center;color:var(--gold-light);font-size:1.4rem;margin:6px 0 22px}
.auth-tabs{display:flex;gap:8px;margin-bottom:20px}
.auth-tabs button{flex:1;padding:10px;border:1px solid var(--gold-dark);background:transparent;color:var(--muted);border-radius:10px;transition:.2s}
.auth-tabs button.active{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg-0);font-weight:700}
.field{margin-bottom:14px}
.field label{display:block;font-size:.8rem;color:var(--muted);margin-bottom:6px}
.field input,.field textarea{width:100%;padding:12px 14px;background:rgba(0,0,0,.4);border:1px solid var(--gold-dark);border-radius:10px;color:var(--txt);font-size:.95rem;outline:none;transition:.2s}
.field input:focus,.field textarea:focus{border-color:var(--gold-light)}
.auth-error{color:var(--danger);font-size:.82rem;min-height:1.1em;margin-bottom:10px;text-align:center}
.btn-primary{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg-0);font-weight:900;font-size:1rem;transition:.25s}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,.4)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.hidden{display:none!important}
#app{position:fixed;inset:0;display:flex;background:var(--bg-0)}
#sidebar{width:340px;flex-shrink:0;display:flex;flex-direction:column;background:var(--panel);border-left:1px solid var(--line)}
.side-head{padding:14px;border-bottom:1px solid var(--line)}
.me-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.me-row .avatar{cursor:pointer}
.me-info{flex:1;min-width:0}
.me-info b{display:block;color:var(--gold-light);font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.me-info span{font-size:.78rem;color:var(--muted)}
.icon-btn{background:transparent;border:none;color:var(--gold);font-size:1.2rem;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.2s}
.icon-btn:hover{background:rgba(201,168,76,.12)}
.search-wrap input{width:100%;padding:10px 14px;background:rgba(0,0,0,.35);border:1px solid var(--gold-dark);border-radius:24px;color:var(--txt);outline:none;font-size:.9rem}
.search-wrap input:focus{border-color:var(--gold-light)}
.side-actions{display:flex;gap:6px;padding:10px 14px;border-bottom:1px solid var(--line)}
.side-actions button{flex:1;padding:8px;font-size:.78rem;border:1px solid var(--gold-dark);background:transparent;color:var(--gold);border-radius:9px;transition:.2s}
.side-actions button:hover{background:rgba(201,168,76,.12)}
#chatList{flex:1;overflow-y:auto}
.chat-item{display:flex;align-items:center;gap:12px;padding:12px 14px;cursor:pointer;border-bottom:1px solid rgba(201,168,76,.06);transition:.15s}
.chat-item:hover{background:rgba(201,168,76,.07)}
.chat-item.active{background:rgba(201,168,76,.14)}
.chat-item .ci-main{flex:1;min-width:0}
.chat-item .ci-top{display:flex;justify-content:space-between;align-items:center}
.chat-item .ci-name{color:var(--gold-light);font-weight:700;font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-item .ci-time{font-size:.7rem;color:var(--muted);flex-shrink:0;margin-right:8px}
.chat-item .ci-last{font-size:.82rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.badge-type{font-size:.62rem;padding:1px 6px;border-radius:6px;background:var(--bg-3);color:var(--gold);margin-right:6px}
.avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--bg-0);overflow:hidden;background:linear-gradient(135deg,var(--gold-dark),var(--gold-light))}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.sm{width:38px;height:38px;font-size:1rem}
.avatar.lg{width:110px;height:110px;font-size:2.6rem}
#chatArea{flex:1;display:flex;flex-direction:column;position:relative;background:linear-gradient(135deg,var(--bg-1),var(--bg-0))}
#emptyState{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px}
#emptyState .ico{font-size:3.4rem;opacity:.5}
#activeChat{flex:1;display:flex;flex-direction:column;min-height:0}
.chat-top{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--panel);border-bottom:1px solid var(--line);cursor:pointer}
.chat-top .ct-main{flex:1;min-width:0}
.chat-top .ct-name{color:var(--gold-light);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-top .ct-sub{font-size:.78rem;color:var(--muted)}
.chat-top .ct-actions{display:flex;gap:4px}
#messages{flex:1;overflow-y:auto;padding:18px 16px;display:flex;flex-direction:column;gap:4px;background-size:cover;background-position:center}
.msg-row{display:flex;width:100%;margin-top:6px}
.msg-row.me{justify-content:flex-start}
.msg-row.other{justify-content:flex-end}
.bubble{max-width:70%;padding:9px 13px;border-radius:16px;position:relative;font-size:.93rem;line-height:1.7;word-break:break-word;animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg-row.me .bubble{background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg-0);border-bottom-right-radius:4px}
.msg-row.other .bubble{background:var(--bg-2);border:1px solid var(--line);color:var(--txt);border-bottom-left-radius:4px}
.bubble .sender{font-size:.74rem;font-weight:700;color:var(--gold-light);margin-bottom:3px;display:block}
.msg-row.me .bubble .sender{color:rgba(0,0,0,.6)}
.bubble img,.bubble video{max-width:240px;border-radius:10px;display:block;margin-top:4px;cursor:pointer}
.bubble audio{margin-top:4px;max-width:230px}
.bubble .meta{display:flex;gap:6px;align-items:center;justify-content:flex-end;font-size:.66rem;opacity:.7;margin-top:3px}
.bubble .edited-tag{font-style:italic}
.bubble .msg-tools{position:absolute;top:-10px;left:6px;display:none;gap:4px}
.bubble:hover .msg-tools{display:flex}
.msg-tools button{background:var(--bg-3);border:1px solid var(--line);color:var(--gold);width:24px;height:24px;border-radius:50%;font-size:.7rem;display:flex;align-items:center;justify-content:center}
.gift-bubble{text-align:center;background:linear-gradient(135deg,#7b1fa2,#c9a84c)!important;color:#fff!important;border:none!important}
.gift-bubble .gift-ico{font-size:2.4rem;display:block}
.gift-bubble .gift-val{font-weight:900;margin-top:4px}
.chat-bottom{display:flex;align-items:flex-end;gap:8px;padding:12px 14px;background:var(--panel);border-top:1px solid var(--line)}
.chat-bottom textarea{flex:1;resize:none;max-height:120px;padding:11px 16px;background:rgba(0,0,0,.35);border:1px solid var(--gold-dark);border-radius:22px;color:var(--txt);font-size:.95rem;outline:none;line-height:1.5}
.chat-bottom textarea:focus{border-color:var(--gold-light)}
.round-btn{width:46px;height:46px;border-radius:50%;border:none;flex-shrink:0;background:linear-gradient(135deg,var(--gold-dark),var(--gold));color:var(--bg-0);font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:.2s}
.round-btn:hover{transform:scale(1.07)}
.round-btn.ghost{background:transparent;color:var(--gold);border:1px solid var(--gold-dark)}
.upload-line{height:3px;background:var(--gold-light);width:0;transition:width .2s;position:absolute;top:0;left:0}
.edit-banner{display:none;align-items:center;gap:10px;padding:8px 16px;background:var(--bg-2);border-top:1px solid var(--line);font-size:.82rem;color:var(--gold-light)}
.edit-banner button{background:transparent;border:none;color:var(--danger);font-size:1rem}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center;z-index:60;padding:20px}
.modal.open{display:flex}
.modal-card{width:100%;max-width:420px;max-height:88vh;overflow-y:auto;background:var(--panel);border:1px solid var(--gold);border-radius:18px;padding:24px}
.modal-card h2{color:var(--gold-light);font-size:1.15rem;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center}
.modal-card h2 .x{background:transparent;border:none;color:var(--muted);font-size:1.3rem}
.center{text-align:center}
.avatar-edit{position:relative;width:110px;margin:0 auto 14px}
.avatar-edit .cam{position:absolute;bottom:0;left:0;width:34px;height:34px;border-radius:50%;background:var(--gold);color:var(--bg-0);border:2px solid var(--panel);display:flex;align-items:center;justify-content:center;font-size:.9rem;cursor:pointer}
.read-field{padding:11px 14px;background:rgba(0,0,0,.3);border:1px dashed var(--gold-dark);border-radius:10px;color:var(--gold-light);font-size:.9rem;margin-bottom:14px}
.credits-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;background:linear-gradient(135deg,#7b1fa2,var(--gold));color:#fff;font-weight:700;margin:6px 0 16px}
.member-list{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.member-chip{background:var(--bg-3);border:1px solid var(--line);border-radius:16px;padding:4px 12px;font-size:.82rem;color:var(--gold-light);display:flex;gap:6px;align-items:center}
.member-chip button{background:none;border:none;color:var(--danger)}
.add-row{display:flex;gap:8px;margin-bottom:8px}
.add-row input{flex:1;padding:11px 14px;background:rgba(0,0,0,.4);border:1px solid var(--gold-dark);border-radius:10px;color:var(--txt);outline:none}
.add-row button{padding:0 16px;border:1px solid var(--gold-dark);background:transparent;color:var(--gold);border-radius:10px}
.result-item{display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;cursor:pointer;transition:.15s}
.result-item:hover{background:rgba(201,168,76,.1)}
.result-item .ri-main{flex:1}
.result-item .ri-main b{color:var(--gold-light);font-size:.92rem}
.result-item .ri-main span{display:block;font-size:.76rem;color:var(--muted)}
.gift-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
.gift-card{background:var(--bg-2);border:1px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;cursor:pointer;transition:.2s}
.gift-card:hover{border-color:var(--gold);transform:translateY(-3px)}
.gift-card .gi{font-size:2rem}
.gift-card .gn{font-size:.78rem;color:var(--gold-light);margin-top:4px}
.gift-card .gc{font-size:.72rem;color:var(--muted)}
.bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.bg-swatch{height:60px;border-radius:10px;cursor:pointer;border:2px solid transparent;transition:.2s}
.bg-swatch:hover{border-color:var(--gold)}
.btn-ghost{width:100%;padding:12px;border:1px solid var(--gold-dark);background:transparent;color:var(--gold);border-radius:10px;font-weight:700;margin-top:8px}
.btn-danger{width:100%;padding:12px;border:1px solid var(--danger);background:transparent;color:var(--danger);border-radius:10px;font-weight:700;margin-top:8px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--bg-3);border:1px solid var(--gold);color:var(--gold-light);padding:12px 24px;border-radius:24px;font-size:.88rem;z-index:90;transition:.35s;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
@media(max-width:760px){
  #sidebar{width:100%;position:absolute;inset:0;z-index:10}
  #app.in-chat #sidebar{display:none}
  #app.in-chat #chatArea{display:flex}
  #chatArea{display:none}
}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo center">👑</div>
    <h1>Wiriper Messenger</h1>
    <div class="auth-tabs">
      <button id="authTabLogin" class="active">ورود</button>
      <button id="authTabRegister">ثبت‌نام</button>
    </div>
    <div class="field" id="regNameRow" style="display:none">
      <label>نام نمایشی</label>
      <input type="text" id="authDisplayName" placeholder="نام شما..." />
    </div>
    <div class="field">
      <label>نام کاربری</label>
      <input type="text" id="authUsername" placeholder="username" autocomplete="off" />
    </div>
    <div class="field">
      <label>رمز عبور</label>
      <input type="password" id="authPassword" placeholder="••••••" />
    </div>
    <div class="auth-error" id="authError"></div>
    <button class="btn-primary" id="authSubmitBtn">ورود</button>
  </div>
</div>

<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="side-head">
      <div class="me-row">
        <div class="avatar" id="meAvatar">👤</div>
        <div class="me-info"><b id="meName">—</b><span id="meUsername">@—</span></div>
        <button class="icon-btn" id="btnProfile" title="پروفایل">⚙️</button>
      </div>
      <div class="search-wrap"><input type="text" id="searchInput" placeholder="جستجوی گفتگوها..." /></div>
    </div>
    <div class="side-actions">
      <button id="btnFindUser">👤 کاربر</button>
      <button id="btnNewGroup">👥 گروه</button>
      <button id="btnNewChannel">📢 کانال</button>
    </div>
    <div id="chatList"></div>
  </aside>

  <main id="chatArea">
    <div id="emptyState"><div class="ico">💬</div><div>یک گفتگو را انتخاب کن یا یک کاربر پیدا کن</div></div>
    <div id="activeChat" class="hidden">
      <div class="chat-top" id="chatTop">
        <button class="icon-btn" id="btnBack" style="display:none">→</button>
        <div class="avatar sm" id="chatAvatar">💬</div>
        <div class="ct-main"><div class="ct-name" id="chatTitle">—</div><div class="ct-sub" id="chatSubtitle">—</div></div>
        <div class="ct-actions">
          <button class="icon-btn" id="btnGift" title="هدیه">🎁</button>
          <button class="icon-btn" id="btnBg" title="بک‌گراند">🖼️</button>
        </div>
      </div>
      <div id="messages"></div>
      <div class="edit-banner" id="editBanner">
        <span>✏️ ویرایش</span>
        <span id="editPreview" style="flex:1;color:var(--muted);overflow:hidden;white-space:nowrap;text-overflow:ellipsis"></span>
        <button id="cancelEditBtn">✕</button>
      </div>
      <div class="chat-bottom" style="position:relative">
        <div class="upload-line" id="uploadLine"></div>
        <button class="round-btn ghost" id="fileBtn" title="پیوست">📎</button>
        <input type="file" id="fileInput" accept="image/*,video/*,audio/*" class="hidden" />
        <textarea id="msgInput" rows="1" placeholder="پیام..."></textarea>
        <button class="round-btn" id="sendBtn">➤</button>
      </div>
    </div>
  </main>
</div>

<div class="modal" id="profileModal"><div class="modal-card">
  <h2>پروفایل من <button class="x" data-close>✕</button></h2>
  <div class="center">
    <div class="avatar-edit"><div class="avatar lg" id="profileAvatarPreview">👤</div>
      <label class="cam" for="profileAvatarInput">📷</label>
      <input type="file" id="profileAvatarInput" accept="image/*" class="hidden" /></div>
    <div class="credits-pill">💎 <span id="profileCredits">0</span> اعتبار</div>
  </div>
  <div class="read-field" id="profileUsername">@—</div>
  <div class="field"><label>نام نمایشی</label><input type="text" id="profileDisplayName" /></div>
  <div class="field"><label>بایو</label><textarea id="profileBio" rows="3" placeholder="درباره من..."></textarea></div>
  <button class="btn-primary" id="btnSaveProfile">ذخیره</button>
  <button class="btn-danger" id="btnLogout">خروج از حساب</button>
</div></div>

<div class="modal" id="newChatModal"><div class="modal-card">
  <h2 id="newChatTitle">گروه جدید <button class="x" data-close>✕</button></h2>
  <div class="field"><label id="newChatNameLabel">نام گروه</label><input type="text" id="newChatName" /></div>
  <label style="font-size:.8rem;color:var(--muted)">افزودن عضو با نام کاربری</label>
  <div class="add-row"><input type="text" id="newChatMemberInput" placeholder="username" /><button id="btnAddMember">افزودن</button></div>
  <div class="member-list" id="newChatMemberList"></div>
  <div class="auth-error" id="newChatError"></div>
  <button class="btn-primary" id="btnCreateChat">ساخت</button>
</div></div>

<div class="modal" id="findUserModal"><div class="modal-card">
  <h2>یافتن کاربر <button class="x" data-close>✕</button></h2>
  <div class="add-row"><input type="text" id="findUserInput" placeholder="نام کاربری..." /><button id="btnSearchUser">جستجو</button></div>
  <div id="findUserResults"></div>
</div></div>

<div class="modal" id="giftModal"><div class="modal-card">
  <h2>ارسال هدیه <button class="x" data-close>✕</button></h2>
  <div class="center"><div class="credits-pill">💎 موجودی: <span id="giftCreditsInfo">0</span></div></div>
  <div class="gift-grid" id="giftGrid"></div>
  <div class="auth-error" id="giftError"></div>
</div></div>

<div class="modal" id="bgModal"><div class="modal-card">
  <h2>بک‌گراند گفتگو <button class="x" data-close>✕</button></h2>
  <div class="bg-grid" id="bgGrid"></div>
  <input type="file" id="bgUploadInput" accept="image/*" class="hidden" />
  <button class="btn-ghost" id="btnBgUpload">📷 آپلود تصویر دلخواه</button>
  <button class="btn-danger" id="btnBgReset">حذف بک‌گراند</button>
</div></div>

<div class="modal" id="userInfoModal"><div class="modal-card center">
  <h2 style="justify-content:flex-end"><button class="x" data-close>✕</button></h2>
  <div class="avatar lg" id="infoAvatar" style="margin:0 auto 12px">👤</div>
  <h3 id="infoName" style="color:var(--gold-light)">—</h3>
  <div id="infoUsername" style="color:var(--muted);margin:4px 0 12px">@—</div>
  <p id="infoBio" style="color:var(--txt);font-size:.9rem;min-height:1.2em;margin-bottom:18px"></p>
  <button class="btn-primary" id="btnStartPrivate">شروع گفتگو</button>
  <button class="btn-ghost" id="btnInfoGift">🎁 ارسال هدیه</button>
</div></div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, addDoc, collection, query, where,
  orderBy, onSnapshot, serverTimestamp, deleteDoc, increment, arrayUnion, getDocs, limit }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

/* ===== جای این مقادیر را با پروژه niyayesh-universe خودت پر کن ===== */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "niyayesh-universe.firebaseapp.com",
  projectId: "niyayesh-universe",
  storageBucket: "niyayesh-universe.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

const $ = id => document.getElementById(id);
const EMAIL_DOMAIN = "@wiriper.app";
const GIFTS = [
  {ico:"🌹",name:"گل رز",cost:5},{ico:"🎂",name:"کیک",cost:10},{ico:"💎",name:"الماس",cost:25},
  {ico:"👑",name:"تاج",cost:50},{ico:"🚀",name:"موشک",cost:75},{ico:"⭐",name:"ستاره",cost:100}
];
const BGS = ["linear-gradient(135deg,#15102a,#0d0a1a)","linear-gradient(135deg,#1a237e,#000)",
  "linear-gradient(135deg,#004d40,#000)","linear-gradient(135deg,#3e2723,#000)",
  "linear-gradient(135deg,#4a148c,#000)","linear-gradient(135deg,#880e4f,#000)",
  "linear-gradient(135deg,#0d47a1,#01579b)","linear-gradient(135deg,#1b5e20,#33691e)"];

let me=null, currentChat=null, unsubChats=null, unsubMsgs=null, editingMsg=null, infoUser=null;

function toast(t){const e=$("toast");e.textContent=t;e.classList.add("show");setTimeout(()=>e.classList.remove("show"),2600);}
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function timeStr(ts){if(!ts)return"";const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString("fa-IR",{hour:"2-digit",minute:"2-digit"});}
function avatarHTML(url,fallback){return url?`<img src="${esc(url)}">`:esc(fallback||"👤");}
async function fileToDataURL(f){return new Promise((res,rej)=>{const r=new FileReader
();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(f);});}

/* --- Auth Logic --- */
$("authTabLogin").onclick=()=>{ $("authTabLogin").classList.add("active");$("authTabRegister").classList.remove("active");$("regNameRow").classList.add("hidden");$("authSubmitBtn").textContent="ورود";};
$("authTabRegister").onclick=()=>{ $("authTabRegister").classList.add("active");$("authTabLogin").classList.remove("active");$("regNameRow").classList.remove("hidden");$("authSubmitBtn").textContent="ثبت‌نام";};

$("authSubmitBtn").onclick=async()=>{
  const u=$("authUsername").value.trim().toLowerCase(),p=$("authPassword").value,dn=$("authDisplayName").value.trim();
  const isReg=$("authTabRegister").classList.contains("active");
  if(!u||!p||(isReg && !dn)){$("authError").textContent="فیلدها را پر کنید";return;}
  $("authSubmitBtn").disabled=true; $("authError").textContent="";
  try{
    if(isReg){
      const snap=await getDoc(doc(db,"usernames",u));
      if(snap.exists()) throw {message:"این نام کاربری قبلاً انتخاب شده"};
      const userCred=await createUserWithEmailAndPassword(auth,u+EMAIL_DOMAIN,p);
      const uid=userCred.user.uid;
      await setDoc(doc(db,"users",uid),{uid,username:u,displayName:dn,photoURL:"",bio:"",credits:1000,createdAt:serverTimestamp()});
      await setDoc(doc(db,"usernames",u),{uid});
    }else{ await signInWithEmailAndPassword(auth,u+EMAIL_DOMAIN,p); }
  }catch(e){ $("authError").textContent=e.message||"خطا در ورود"; $("authSubmitBtn").disabled=false; }
};

onAuthStateChanged(auth,async(user)=>{
  if(user){
    const d=await getDoc(doc(db,"users",user.uid));
    if(d.exists()){
      me=d.data(); $("authScreen").classList.add("hidden"); $("app").classList.remove("hidden");
      renderMe(); loadChats();
    }
  }else{
    me=null; $("app").classList.add("hidden"); $("authScreen").classList.remove("hidden");
    $("authSubmitBtn").disabled=false;
    if(unsubChats) unsubChats();
    if(unsubMsgs) unsubMsgs();
  }
});

function renderMe(){
  $("meName").textContent=me.displayName; $("meUsername").textContent="@"+me.username;
  $("meAvatar").innerHTML=avatarHTML(me.photoURL,me.displayName[0]);
  $("profileDisplayName").value=me.displayName; $("profileBio").value=me.bio;
  $("profileUsername").textContent="@"+me.username; $("profileCredits").textContent=me.credits;
  $("profileAvatarPreview").innerHTML=avatarHTML(me.photoURL,me.displayName[0]);
}

/* --- Chats & Messages --- */
function loadChats(){
  if(unsubChats) unsubChats();
  const q=query(collection(db,"chats"),where("members","array-contains",me.uid),orderBy("updatedAt","desc"));
  unsubChats=onSnapshot(q,(snap)=>{
    const list=$("chatList"); list.innerHTML="";
    snap.forEach(d=>{
      const chat=d.data(); chat.id=d.id;
      const el=document.createElement("div"); el.className="chat-item"+(currentChat?.id===chat.id?" active":"");
      let title=chat.name||"?", sub=chat.lastMsg||"پیامی نیست", icon="💬";
      if(chat.type==="private"){
        const other=chat.members.find(u=>u!==me.uid);
        title=chat.nicknames?.[other]||"کاربر"; icon=chat.photos?.[other]||"👤";
      }
      el.innerHTML=`<div class="avatar sm">${avatarHTML(icon,title[0])}</div>
        <div class="ci-main"><div class="ci-top"><span class="ci-name">${esc(title)}</span><span class="ci-time">${timeStr(chat.updatedAt)}</span></div>
        <div class="ci-last">${chat.type!=='private'?'<span class="badge-type">'+(chat.type==='group'?'گروه':'کانال')+'</span>':''}${esc(sub)}</div></div>`;
      el.onclick=()=>selectChat(chat);
      list.appendChild(el);
    });
  });
}

async function selectChat(chat){
  currentChat=chat; $("activeChat").classList.remove("hidden"); $("emptyState").classList.add("hidden");
  $("app").classList.add("in-chat"); $("btnBack").style.display="flex";
  let title=chat.name, sub=chat.type==='group'?'گروه':(chat.type==='channel'?'کانال':'آنلاین'), icon=chat.photoURL;
  if(chat.type==='private'){
    const other=chat.members.find(u=>u!==me.uid);
    title=chat.nicknames?.[other]; icon=chat.photos?.[other];
  }
  $("chatTitle").textContent=title; $("chatSubtitle").textContent=sub;
  $("chatAvatar").innerHTML=avatarHTML(icon,title[0]);
  $("messages").style.backgroundImage=chat.bg?`url(${chat.bg})`:BGS[0];
  
  if(unsubMsgs) unsubMsgs();
  const q=query(collection(db,"chats",chat.id,"messages"),orderBy("createdAt","asc"),limit(100));
  unsubMsgs=onSnapshot(q,(snap)=>{
    const box=$("messages"); box.innerHTML="";
    snap.forEach(d=>{
      const m=d.data(); m.id=d.id;
      const row=document.createElement("div"); row.className="msg-row "+(m.senderId===me.uid?'me':'other');
      let content="";
      if(m.type==='text') content=esc(m.body).replace(/\n/g,"<br>");
      else if(m.type==='image') content=`<img src="${m.url}" onclick="window.open('${m.url}')">`;
      else if(m.type==='video') content=`<video src="${m.url}" controls></video>`;
      else if(m.type==='audio') content=`<audio src="${m.url}" controls></audio>`;
      else if(m.type==='gift') content=`<div class="gift-ico">${m.gift.ico}</div><div class="gift-val">${m.gift.name}</div>`;

      row.innerHTML=`<div class="bubble ${m.type==='gift'?'gift-bubble':''}">
        ${(chat.type!=='private'&& m.senderId!==me.uid)?'<span class="sender">'+esc(m.senderName)+'</span>':''}
        ${content}
        <div class="meta">${m.edited?'<span class="edited-tag">ویرایش شده</span>':''}<span>${timeStr(m.createdAt)}</span></div>
        ${m.senderId===me.uid && m.type==='text'?`<div class="msg-tools"><button onclick="editMsg('${m.id}','${esc(m.body)}')">✏️</button><button onclick="delMsg('${m.id}')">🗑️</button></div>`:''}
      </div>`;
      box.appendChild(row);
    });
    box.scrollTop=box.scrollHeight;
  });
}

$("sendBtn").onclick=async()=>{
  const val=$("msgInput").value.trim(); if(!val || !currentChat) return;
  if(editingMsg){
    await updateDoc(doc(db,"chats",currentChat.id,"messages",editingMsg.id),{body:val,edited:true});
    cancelEdit();
  }else{
    const m={senderId:me.uid,senderName:me.displayName,type:"text",body:val,createdAt:serverTimestamp()};
    await addDoc(collection(db,"chats",currentChat.id,"messages"),m);
    await updateDoc(doc(db,"chats",currentChat.id),{lastMsg:val,updatedAt:serverTimestamp()});
  }
  $("msgInput").value=""; $("msgInput").style.height="auto";
};

window.editMsg=(id,body)=>{ editingMsg={id,body}; $("editBanner").style.display="flex"; $("editPreview").textContent=body; $("msgInput").value=body; $("msgInput").focus(); };
window.delMsg=async(id)=>{ if(confirm("حذف پیام؟")) await deleteDoc(doc(db,"chats",currentChat.id,"messages",id)); };
function cancelEdit(){ editingMsg=null; $("editBanner").style.display="none"; $("msgInput").value=""; }
$("cancelEditBtn").onclick=cancelEdit;

/* --- Files & Media --- */
$("fileBtn").onclick=()=>$ encapsulation("fileInput").click();
$("fileInput").onchange=async(e)=>{
  const file=e.target.files[0]; if(!file || !currentChat) return;
  const type=file.type.startsWith('image')?'image':(file.type.startsWith('video')?'video':'audio');
  const path=`chats/${currentChat.id}/${Date.now()}_${file.name}`;
  const sref=sRef(storage,path);
  $("uploadLine").style.width="30%";
  try{
    const task=await uploadBytes(sref,file);
    $("uploadLine").style.width="70%";
    const url=await getDownloadURL(task.ref);
    await addDoc(collection(db,"chats",currentChat.id,"messages"),{senderId:me.uid,senderName:me.displayName,type,url,createdAt:serverTimestamp()});
    await updateDoc(doc(db,"chats",currentChat.id),{lastMsg:"[فایل]",updatedAt:serverTimestamp()});
    $("uploadLine").style.width="0";
  }catch(err){ toast("خطا در آپلود"); $("uploadLine").style.width="0"; }
};

/* --- Modals & Search --- */
function openM(id){ $(id).classList.add("open"); }
document.querySelectorAll("[data-close]").forEach(b=>b.onclick=()=>b.closest(".modal").classList.remove("open"));

$("btnProfile").onclick=()=>openM("profileModal");
$("btnFindUser").onclick=()=>openM("findUserModal");
$("btnNewGroup").onclick=()=>{ $("newChatTitle").textContent="گروه جدید"; $("newChatNameLabel").textContent="نام گروه"; $("newChatModal").dataset.type="group"; openM("newChatModal"); };
$("btnNewChannel").onclick=()=>{ $("newChatTitle").textContent="کانال جدید"; $("newChatNameLabel").textContent="نام کانال"; $("newChatModal").dataset.type="channel"; openM("newChatModal"); };
$("btnBack").onclick=()=>{ $("app").classList.remove("in-chat"); currentChat=null; };

$("btnSearchUser").onclick=async()=>{
  const u=$("findUserInput").value.trim().toLowerCase();
  const res=$("findUserResults"); res.innerHTML="در حال جستجو...";
  const snap=await getDocs(query(collection(db,"users"),where("username","==",u)));
  res.innerHTML="";
  if(snap.empty) res.textContent="کاربری یافت نشد";
  snap.forEach(d=>{
    const udata=d.data();
    const el=document.createElement("div"); el.className="result-item";
    el.innerHTML=`<div class="avatar sm">${avatarHTML(udata.photoURL,udata.displayName[0])}</div>
      <div class="ri-main"><b>${esc(udata.displayName)}</b><span>@${udata.username}</span></div>`;
    el.onclick=()=>{ infoUser=udata; showUserInfo(); };
    res.appendChild(el);
  });
};

function showUserInfo(){
  $("infoName").textContent=infoUser.displayName; $("infoUsername").textContent="@"+infoUser.username;
  $("infoBio").textContent=infoUser.bio||"بدون بایو";
  $("infoAvatar").innerHTML=avatarHTML(infoUser.photoURL,infoUser.displayName[0]);
  openM("userInfoModal");
}

$("btnStartPrivate").onclick=async()=>{
  if(infoUser.uid===me.uid) return;
  const chatId=[me.uid,infoUser.uid].sort().join("_");
  const docRef=doc(db,"chats",chatId);
  const d=await getDoc(docRef);
  if(!d.exists()){
    await setDoc(docRef,{type:"private",members:[me.uid,infoUser.uid],updatedAt:serverTimestamp(),lastMsg:"شروع گفتگو",
      nicknames:{[me.uid]:me.displayName,[infoUser.uid]:infoUser.displayName},
      photos:{[me.uid]:me.photoURL,[infoUser.uid]:infoUser.photoURL}});
  }
  $("userInfoModal").classList.remove("open"); $("findUserModal").classList.remove("open");
  selectChat((await getDoc(docRef)).data());
};

/* --- Profile Update --- */
$("btnSaveProfile").onclick=async()=>{
  const dn=$("profileDisplayName").value.trim(), bio=$("profileBio").value.trim();
  const up={displayName:dn,bio};
  const file=$("profileAvatarInput").files[0];
  if(file){
    const sref=sRef(storage,`avatars/${me.uid}`);
    const task=await uploadBytes(sref,file);
    up.photoURL=await getDownloadURL(task.ref);
  }
  await updateDoc(doc(db,"users",me.uid),up);
  me={...me,...up}; renderMe(); toast("پروفایل بروز شد");
  $("profileModal").classList.remove("open");
};
$("profileAvatarInput").onchange=async(e)=>{ if(e.target.files[0]) $("profileAvatarPreview").innerHTML=`<img src="${await fileToDataURL(e.target.files[0])}">`; };

/* --- Group/Channel Creation --- */
let tempMembers=[];
$("btnAddMember").onclick=async()=>{
  const u=$("newChatMemberInput").value.trim().toLowerCase();
  const snap=await getDocs(query(collection(db,"users"),where("username","==",u)));
  if(snap.empty){ $("newChatError").textContent="کاربر یافت نشد"; return; }
  const ud=snap.docs[0].data();
  if(tempMembers.find(m=>m.uid===ud.uid)) return;
  tempMembers.push(ud);
  const chip=document.createElement("div"); chip.className="member-chip";
  chip.innerHTML=`${ud.displayName} <button onclick="this.parentElement.remove()">✕</button>`;
  $("newChatMemberList").appendChild(chip);
  $("newChatMemberInput").value=""; $("newChatError").textContent="";
};

$("btnCreateChat").onclick=async()=>{
  const name=$("newChatName").value.trim(); if(!name) return;
  const type=$("newChatModal").dataset.type;
  const members=[me.uid,...tempMembers.map(m=>m.uid)];
  const chatObj={name,type,members,owner:me.uid,updatedAt:serverTimestamp(),lastMsg:"ایجاد شد",photoURL:""};
  const docRef=await addDoc(collection(db,"chats"),chatObj);
  $("newChatModal").classList.remove("open");
  tempMembers=[]; $("newChatMemberList").innerHTML=""; $("newChatName").value="";
  selectChat({...chatObj,id:docRef.id});
};

/* --- Gifts --- */
$("btnGift").onclick=()=>{ $("giftCreditsInfo").textContent=me.credits; renderGifts(); openM("giftModal"); };
function renderGifts(){
  const g=$("giftGrid"); g.innerHTML="";
  GIFTS.forEach(gift=>{
    const d=document.createElement("div"); d.className="gift-card";
    d.innerHTML=`<div class="gi">${gift.ico}</div><div class="gn">${gift.name}</div><div class="gc">💎 ${gift.cost}</div>`;
    d.onclick=()=>sendGift(gift);
    g.appendChild(d);
  });
}
async function sendGift(gift){
  if(me.credits < gift.cost){ $("giftError").textContent="اعتبار کافی نیست"; return; }
  await updateDoc(doc(db,"users",me.uid),{credits:increment(-gift.cost)});
  me.credits -= gift.cost; renderMe();
  await addDoc(collection(db,"chats",currentChat.id,"messages"),{senderId:me.uid,senderName:me.displayName,type:"gift",gift,createdAt:serverTimestamp()});
  $("giftModal").classList.remove("open"); toast("هدیه ارسال شد");
}
$("btnInfoGift").onclick=()=>{ $("userInfoModal").classList.remove("open"); $("btnGift").click(); };

/* --- Backgrounds --- */
$("btnBg").onclick=()=>{
  const g=$("bgGrid"); g.innerHTML="";
  BGS.forEach(b=>{
    const d=document.createElement("div"); d.className="bg-swatch"; d.style.background=b;
    d.onclick=()=>setBg(b);
    g.appendChild(d);
  });
  openM("bgModal");
};
async function setBg(val){
  await updateDoc(doc(db,"chats",currentChat.id),{bg:val});
  $("messages").style.backgroundImage=val.startsWith('http')?`url(${val})`:val;
  $("bgModal").classList.remove("open");
}
$("btnBgUpload").onclick=()=>$("bgUploadInput").click();
$("bgUploadInput").onchange=async(e)=>{
  const f=e.target.files[0]; if(!f) return;
  const sref=sRef(storage,`bgs/${currentChat.id}`);
  const task=await uploadBytes(sref,f);
  const url=await getDownloadURL(task.ref);
  setBg(url);
};
$("btnBgReset").onclick=()=>setBg(BGS[0]);

$("btnLogout").onclick=()=>signOut(auth);
</script>
</body>
</html>
