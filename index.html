<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = { /* تنظیماتت اینجا باشه */ };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  async function check() {
    try {
      const docRef = doc(db, "website_data", "config");
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        alert("اتصال برقرار شد! داده‌ها: " + JSON.stringify(docSnap.data()));
      } else {
        alert("اتصال برقرار شد، ولی داکیومنت پیدا نشد! اسم کالکشن رو چک کن.");
      }
    } catch (e) {
      alert("خطا در اتصال: " + e.message);
    }
  }
  check();
</script>
