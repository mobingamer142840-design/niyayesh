<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobin & Niyayesh</title>

<!-- لود فونت‌های بسیار زیبا -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Vazirmatn:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Vazirmatn', sans-serif;
    background: #000;
    overflow: hidden;
    height: 100vh;
    color: white;
    user-select: none;
}

/* 1. ELEGANT ANIMATED BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: linear-gradient(120deg, #1a0004 0%, #000000 50%, #220008 100%);
    background-size: 200% 200%;
    animation: gradientShift 15s ease infinite;
    z-index: -3;
}

@keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.fog {
    position: fixed;
    inset: 0;
    background: url('https://i.imgur.com/3ZQ3ZQZ.png');
    opacity: 0.06;
    animation: moveFog 70s linear infinite;
    z-index: -2;
    pointer-events: none;
}

@keyframes moveFog {
    from { transform: translateX(0) scale(1.1); }
    to { transform: translateX(-600px) scale(1.1); }
}

/* 2. ROMANTIC NETFLIX INTRO */
#netflix-intro {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: none;
    justify-content: center;
    align-items: center;
}

.netflix-text {
    font-family: 'Cinzel', serif;
    font-size: 9rem;
    font-weight: 900;
    color: #ff1a40;
    letter-spacing: 5px;
    opacity: 0;
    animation: romanticZoom 4s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
    text-shadow: 0 0 60px rgba(255, 26, 64, 0.9), 0 0 20px rgba(255, 255, 255, 0.4);
}

@keyframes romanticZoom {
    0% { transform: scale(0.6); filter: blur(20px); opacity: 0; }
    20% { transform: scale(1); filter: blur(0); opacity: 1; }
    60% { transform: scale(1.03); filter: blur(0); opacity: 1; text-shadow: 0 0 80px rgba(255, 26, 64, 1); }
    100% { transform: scale(5); filter: blur(30px); opacity: 0; }
}

/* 3. LOGIN BOX (GLASSMORPHISM) */
.login-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 380px;
    padding: 55px 40px;
    background: rgba(20, 0, 5, 0.4);
    border-radius: 35px;
    border: 1px solid rgba(255, 100, 100, 0.15);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    text-align: center;
    box-shadow: 0 30px 80px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(255, 26, 64, 0.05);
    transition: all 1s ease;
}

.login-container h1 {
    font-family: 'Cinzel', serif;
    color: #ff4d6d;
    font-size: 2.6rem;
    margin-bottom: 15px;
    text-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
}

.login-container p {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.75);
    margin-bottom: 40px;
    letter-spacing: 2px;
    font-weight: 300;
}

input {
    width: 100%;
    padding: 18px;
    margin-bottom: 30px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 18px;
    background: rgba(0, 0, 0, 0.5);
    color: white;
    outline: none;
    text-align: center;
    font-size: 1.1rem;
    letter-spacing: 3px;
    transition: 0.4s;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

input:focus {
    border-color: #ff4d6d;
    box-shadow: 0 0 25px rgba(255, 77, 109, 0.3), inset 0 0 15px rgba(255, 77, 109, 0.1);
    transform: scale(1.02);
    background: rgba(0, 0, 0, 0.7);
}

button {
    width: 100%;
    padding: 20px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, #a60021 0%, #ff1a40 100%);
    color: white;
    font-size: 1.2rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 30px rgba(255, 26, 64, 0.3);
}

button:hover {
    transform: translateY(-5px) scale(1.03);
    box-shadow: 0 15px 40px rgba(255, 26, 64, 0.5);
}

/* 4. MAIN CONTENT & FLOATING LETTER */
#main {
    display: none;
    height: 100vh;
    overflow-y: auto;
    padding: 80px 20px;
    opacity: 0;
    transition: opacity 3s ease;
    perspective: 1000px;
}

#main::-webkit-scrollbar { width: 5px; }
#main::-webkit-scrollbar-track { background: transparent; }
#main::-webkit-scrollbar-thumb { background: rgba(255, 77, 109, 0.3); border-radius: 10px; }

.letter {
    max-width: 850px;
    margin: auto;
    padding: 80px 60px;
    border-radius: 40px;
    background: rgba(15, 2, 5, 0.55);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(35px);
    -webkit-backdrop-filter: blur(35px);
    box-shadow: 0 40px 100px rgba(0,0,0,0.9), inset 0 0 60px rgba(255, 77, 109, 0.05);
    text-align: center;
    position: relative;
    animation: floatLetter 8s ease-in-out infinite;
}

@keyframes floatLetter {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

.title {
    font-family: 'Cinzel', serif;
    font-size: 3.5rem;
    font-weight: 700;
    color: #ff4d6d;
    margin-bottom: 50px;
    text-shadow: 0 0 45px rgba(255, 77, 109, 0.5);
    letter-spacing: 2px;
}

/* 5. ELEGANT GALLERY */
.gallery {
    display: flex;
    gap: 30px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 60px;
}

.gallery img {
    width: 250px;
    height: 320px;
    object-fit: cover;
    border-radius: 20px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
    transition: 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    filter: brightness(0.9);
}

.gallery img:hover {
    transform: translateY(-15px) scale(1.05) rotate(2deg);
    border-color: rgba(255, 77, 109, 0.4);
    box-shadow: 0 30px 60px rgba(255, 26, 64, 0.2);
    filter: brightness(1.1);
}

/* 6. TYPING TEXT (UPDATED: SMALLER & BOLD) */
.text {
    font-size: 1.25rem; /* یکم کوچیک‌تر شد */
    font-weight: 700;   /* کاملاً بولد و جذاب شد */
    line-height: 2.7;
    color: #f8f8f8;
    margin: 40px 0;
    min-height: 350px;
    text-align: right;
    text-shadow: 0 2px 15px rgba(0,0,0,0.9);
}

/* 7. SPOTIFY PLAYER */
.music {
    margin-top: 60px;
    display: flex;
    justify-content: center;
    opacity: 0;
    transform: translateY(40px);
    transition: all 2.5s ease;
}

.music.show {
    opacity: 1;
    transform: translateY(0);
}

iframe {
    width: 100%;
    max-width: 650px;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.9), 0 0 30px rgba(255,255,255,0.03);
    border: none;
}

/* 8. CREATOR SIGNATURE */
.creator {
    margin-top: 70px;
    font-family: 'Cinzel', serif;
    font-size: 1.3rem;
    color: rgba(255, 255, 255, 0.2);
    letter-spacing: 5px;
    text-transform: uppercase;
    transition: 0.5s;
    font-weight: 500;
}

.creator:hover {
    color: rgba(255, 77, 109, 0.9);
    text-shadow: 0 0 20px rgba(255, 77, 109, 0.6);
    letter-spacing: 7px;
}

/* 9. GLOWING ORB PARTICLES */
.particle {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: -1;
    background: #fff;
    animation: floatUp ease-in infinite;
}

@keyframes floatUp {
    0% { transform: translateY(110vh) translateX(0) scale(0); opacity: 0; }
    30% { opacity: 0.6; }
    70% { opacity: 0.6; }
    100% { transform: translateY(-10vh) translateX(100px) scale(1.5); opacity: 0; }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>

<!-- NETFLIX INTRO SCREEN -->
<div id="netflix-intro">
    <div class="netflix-text">N</div>
</div>

<!-- LOGIN -->
<div class="login-container" id="login">
    <h1>Niyayesh 🥹🫂💕</h1>
    <p>Only love knows the password</p>
    <input id="pass" type="password" placeholder="رمز ورود را وارد کن...">
    <button onclick="enter()">ورود به قلب من</button>
</div>

<!-- MAIN CONTENT -->
<div id="main">
    <div class="letter">
        <div class="title">For Niyayesh 🥹🫂💕</div>

        <div class="gallery">
            <img src="https://i.ibb.co/B2JypFvQ/376-D4-ACC-3-DEE-4-E58-83-B7-03-D9-DC211-FB5.png" alt="Memory 1">
            <img src="https://i.ibb.co/qMknX2zw/F84202-ED-5840-473-A-984-D-DE4259-D4-BB25.png" alt="Memory 2">
        </div>

        <!-- متن عاشقانه -->
        <div class="text" id="typed-text"></div>

        <!-- اسپاتیفای پلیر: آهنگ Sweater Weather از The Neighbourhood -->
        <div class="music" id="music-container">
            <iframe src="https://open.spotify.com/embed/track/2QjOHCTQ1Jl3zawyYOpxh6?utm_source=generator&theme=0" width="100%" height="152" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>

        <!-- امضای سازنده -->
        <div class="creator">Created by Mobin</div>
    </div>
</div>

<script>
const loveLetter = `نیایش عزیزم،\n\nنمی‌دونم چطور بگم ولی تو برای من فقط یه آدم نیستی… یه حسِ آروم و قشنگی که توی شلوغ‌ترین لحظه‌های زندگی هم منو نگه می‌داره تو فرشته‌می.\n\nبا تو حتی روزای بدم از بین می‌رن. یه پیام از تو می‌تونه حال منو عوض کنه و یه فکر کوچیک ازت می‌تونه بهم آرامش بده.\n\nتو برام مهمی… بیشتر از چیزی که بشه راحت گفت.\n\nفقط خواستم بدونی بودنِ تو توی زندگی من یه اتفاق ساده نیست، یه چیز قشنگه که قدرشو می‌دونم.\n\nقول میدم یه زندگی برات بسازم که پر از آرامش باشه و اینو بدون همیشه کنارتم قشنگ تر از قاصدک :)\n\nدوست دارم مال منی:)\n\nباعشق 🫂💕🥹\nMobin`;

function enter(){
    let p = document.getElementById("pass").value;

    if(p === "mobinloveniyayesh"){
        document.getElementById("login").style.display = "none";
        playRomanticSound();

        const intro = document.getElementById("netflix-intro");
        intro.style.display = "flex";

        setTimeout(() => {
            intro.style.display = "none";
            
            const mainContent = document.getElementById("main");
            mainContent.style.display = "block";
            
            setTimeout(() => { mainContent.style.opacity = "1"; }, 100);
            
            createMagicParticles();
            
            typeWriter(loveLetter, 0, "typed-text");
            
        }, 4000);

    } else {
        alert("رمز اشتباه است... دوباره تلاش کن عشق من");
    }
}

function typeWriter(text, i, elementId) {
    if (i < text.length) {
        let char = text.charAt(i);
        if(char === "\n") {
            document.getElementById(elementId).innerHTML += "<br>";
        } else {
            document.getElementById(elementId).innerHTML += char;
        }
        
        let speed = char === "." || char === "،" || char === "…" ? 450 : 65;
        setTimeout(() => { typeWriter(text, i + 1, elementId); }, speed);
    } else {
        setTimeout(() => {
            document.getElementById("music-container").classList.add("show");
        }, 800);
    }
}

function createMagicParticles() {
    const colors = ['rgba(255, 77, 109, 0.6)', 'rgba(255, 26, 64, 0.4)', 'rgba(255, 179, 193, 0.5)'];
    for(let i = 0; i < 40; i++) {
        let p = document.createElement("div");
        p.className = "particle";
        let size = Math.random() * 8 + 4;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "vw";
        p.style.boxShadow = `0 0 ${Math.random() * 15 + 10}px ${colors[Math.floor(Math.random() * colors.length)]}`;
        p.style.background = 'transparent';
        p.style.animationDuration = (Math.random() * 10 + 6) + "s";
        p.style.animationDelay = Math.random() * 5 + "s";
        document.body.appendChild(p);
    }
}

function playRomanticSound() {
    try {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let t = ctx.currentTime;
        
        function playTone(freq, type, startTime, duration, vol) {
            let osc = ctx.createOscillator();
            let gain = ctx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(vol, startTime + 0.5);
            gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start(startTime);
            osc.stop(startTime + duration);
        }

        playTone(261.63, 'sine', t, 3.5, 0.4); 
        playTone(329.63, 'sine', t, 3.5, 0.4); 
        playTone(392.00, 'sine', t, 3.5, 0.4); 
        playTone(523.25, 'triangle', t + 0.4, 4, 0.15); 
        playTone(659.25, 'triangle', t + 0.6, 4, 0.1); 

    } catch(e) {
        console.log("Audio API not supported");
    }
}
</script>

</body>
</html>
