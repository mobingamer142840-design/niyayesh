<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobin & Niyayesh</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Vazirmatn:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:'Vazirmatn';
background:#000;
overflow:hidden;
color:white;
height:100vh;
}

/* 🌑 cinematic background */
.bg{
position:fixed;
inset:0;
background:radial-gradient(circle at center,#3b0000 0%,#000 70%);
z-index:-3;
}

/* 🌫 fog */
.fog{
position:fixed;
inset:0;
background:url('https://i.imgur.com/3ZQ3ZQZ.png');
opacity:.04;
animation:move 25s linear infinite;
z-index:-2;
}

@keyframes move{
from{transform:translateX(0)}
to{transform:translateX(-300px)}
}

/* 🩸 blood particles */
.blood{
position:fixed;
top:-20px;
width:2px;
height:120px;
background:linear-gradient(to bottom,#ff0000,transparent);
opacity:.35;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(120vh)}
}

/* 🔐 login */
.login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:340px;
padding:35px;
background:rgba(0,0,0,.7);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
backdrop-filter:blur(12px);
text-align:center;
box-shadow:0 0 80px rgba(255,0,0,.25);
}

.login h1{
font-family:'Cinzel';
color:#ff2b2b;
margin-bottom:10px;
}

input{
width:100%;
padding:14px;
margin:15px 0;
border:none;
border-radius:12px;
background:#120707;
color:white;
outline:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#7a0000;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#ff0000;
transform:scale(1.03);
}

/* 💌 main */
#main{
display:none;
height:100vh;
overflow-y:auto;
padding:60px 20px;
}

/* letter */
.letter{
max-width:900px;
margin:auto;
padding:50px;
border-radius:30px;
background:rgba(10,0,0,.75);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(14px);
box-shadow:0 0 100px rgba(255,0,0,.25);
animation:open 2s ease;
}

@keyframes open{
from{opacity:0;transform:scale(.9);filter:blur(10px)}
to{opacity:1;transform:scale(1);filter:blur(0)}
}

.title{
font-family:'Cinzel';
font-size:3rem;
text-align:center;
color:#ff3b3b;
text-shadow:0 0 30px rgba(255,0,0,.4);
margin-bottom:25px;
}

/* gallery */
.gallery{
display:flex;
gap:12px;
justify-content:center;
flex-wrap:wrap;
margin-bottom:30px;
}

.gallery img{
width:180px;
height:220px;
object-fit:cover;
border-radius:18px;
border:1px solid rgba(255,255,255,.15);
box-shadow:0 0 40px rgba(255,0,0,.3);
transition:.4s;
}

.gallery img:hover{
transform:scale(1.08) rotate(-1deg);
filter:brightness(1.2);
}

/* text typing */
.text{
font-size:1.2rem;
line-height:2.7;
text-shadow:0 0 10px rgba(255,0,0,.2);
white-space:pre-line;
min-height:200px;
}

/* quote */
.quote{
margin-top:40px;
text-align:center;
font-size:1.7rem;
color:#ff6b6b;
font-family:'Cinzel';
}

/* heart */
.heart{
text-align:center;
font-size:2rem;
animation:beat 1.2s infinite;
margin-top:20px;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.3)}
100%{transform:scale(1)}
}

/* final dedication */
.end{
margin-top:50px;
text-align:center;
line-height:2;
opacity:.9;
}

.end h2{
font-family:'Cinzel';
color:#ff2b2b;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="fog"></div>

<!-- LOGIN -->
<div class="login" id="login">
<h1>Niyayesh 🥹🫂💕</h1>
<p>Only love knows the password...</p>

<input type="password" id="pass">
<button onclick="start()">Enter</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="letter">

<div class="title">For Niyayesh 🥹🫂💕</div>

<div class="gallery">
<img src="https://i.ibb.co/B2JypFvQ/376-D4-ACC-3-DEE-4-E58-83-B7-03-D9-DC211-FB5.png">
<img src="https://i.ibb.co/qMknX2zw/F84202-ED-5840-473-A-984-D-DE4259-D4-BB25.png">
</div>

<div class="text" id="type"></div>

<div class="quote">“Forever. Always. You and Me.”</div>

<div class="heart">🖤</div>

<div class="end">
<h2>Dedicated to my love, Niyayesh</h2>
<p>
تقدیم به عشقم نیایش از طرف مبین<br><br>
Dedicated to my love, Niyayesh, from Mobin
</p>
</div>

</div>
</div>

<script>
function start(){
let p=document.getElementById("pass").value;
if(p==="niyayesh14284@"){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

/* blood */
for(let i=0;i<50;i++){
let b=document.createElement("div");
b.className="blood";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=(2+Math.random()*4)+"s";
document.body.appendChild(b);
}

/* typing effect */
let text = `نیایش...
تو برای من فقط عشق نیستی.

تو آرامشی هستی که در تاریک‌ترین شب‌ها هم روشنم می‌کند.

اگر هزار دنیا وجود داشته باشد،
باز هم در همه آن‌ها تو را انتخاب می‌کنم.

تو خانه‌ی منی...
نفس منی...
و دلیل ادامه دادن منی.`;

let i=0;
function type(){
document.getElementById("type").innerHTML += text[i];
i++;
if(i<text.length) setTimeout(type,35);
}
type();

}else{
alert("Wrong password...");
}
}
</script>

</body>
</html>
