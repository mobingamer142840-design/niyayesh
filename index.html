<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a1128">
    <title>پادشاهی ابدی مبین و نیایش</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800;900&family=Vazirmatn:wght@300;400;700;900&family=Lalezar&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f0d58c;
            --navy: #0a1128;
            --blue-deep: #1a2a6c;
            --crimson: #a51c30;
            --cream: #fcf8f2;
            --text: #3a3226;
            --text-light: #5c4f3d;
            --white: #ffffff;
            --glass: rgba(255,255,255,0.08);
            --glass-border: rgba(212,175,55,0.3);
            --shadow: 0 20px 50px rgba(0,0,0,0.3);
            --radius: 20px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Vazirmatn', sans-serif;
            background: linear-gradient(135deg, #0a1128 0%, #1a0f2e 50%, #0a1128 100%);
            color: var(--white);
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        .lalezar { font-family: 'Lalezar', cursive; }
        .cinzel { font-family: 'Cinzel', serif; }

        #gold-particles {
            position: fixed; inset: 0; z-index: -1; pointer-events: none;
        }

        #custom-alert {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%) translateY(-220px);
            background: var(--cream); border: 2px solid var(--gold);
            box-shadow: 0 10px 40px rgba(212,175,55,0.5); padding: 14px 30px;
            border-radius: 40px; z-index: 10000; transition: transform 0.6s;
            display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--text);
            pointer-events: none;
        }
        #custom-alert.show { transform: translateX(-50%) translateY(0); pointer-events: auto; }

        .login-wrapper {
            position: fixed; inset: 0; z-index: 9000; display: flex; align-items: center; justify-content: center;
            background: rgba(10,17,40,0.95); backdrop-filter: blur(20px);
        }
        .login-container {
            width: 100%; max-width: 420px; background: var(--cream); border: 2px solid var(--gold);
            border-radius: 30px; padding: 40px 30px; text-align: center;
            box-shadow: 0 30px 80px rgba(0,0,0,0.7), inset 0 0 30px rgba(212,175,55,0.2);
            color: var(--text);
        }
        .login-container h1 { font-family: 'Lalezar', cursive; font-size: 3rem; color: var(--blue-deep); margin-bottom: 10px; }
        .login-container p { color: var(--text-light); margin-bottom: 30px; }

        .tab-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn {
            flex: 1; padding: 10px; border: 1px solid var(--gold); background: transparent;
            border-radius: 20px; cursor: pointer; font-weight: 700; transition: 0.3s;
        }
        .tab-btn.active { background: var(--gold); color: white; }

        .form-group { margin-bottom: 15px; }
        .form-group input {
            width: 100%; padding: 14px 20px; border: 1px solid rgba(212,175,55,0.5);
            border-radius: 15px; background: rgba(255,255,255,0.8); color: #2c003e;
            font-family: inherit; outline: none; transition: 0.3s;
        }
        .form-group input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(212,175,55,0.3); }

        .action-btn {
            width: 100%; padding: 14px; border: none; border-radius: 15px;
            font-weight: 900; cursor: pointer; transition: 0.3s; font-family: inherit;
        }
        .primary-btn {
            background: linear-gradient(90deg, #d4af37, #b4942e); color: white;
            box-shadow: 0 8px 20px rgba(212,175,55,0.4);
        }
        .primary-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(212,175,55,0.6); }
        .secondary-btn {
            background: transparent; border: 2px solid var(--gold); color: var(--blue-deep);
        }

        .navbar {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(10,17,40,0.9); border: 1px solid var(--gold);
            padding: 8px 20px; border-radius: 40px; backdrop-filter: blur(20px);
            z-index: 1000; display: none; gap: 8px; max-width: 95vw; overflow-x: auto;
            white-space: nowrap; box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .navbar.show { display: flex; }
        .navbar a {
            color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.85rem;
            font-weight: 700; padding: 8px 14px; border-radius: 20px; transition: 0.3s;
        }
        .navbar a:hover, .navbar a.active { color: white; background: var(--gold); }

        #main { display: none; opacity: 0; padding: 100px 15px 80px; transition: opacity 1.5s; }
        .container { max-width: 960px; margin: auto; display: flex; flex-direction: column; gap: 70px; }

        .section-card {
            background: rgba(255,255,240,0.06); border: 1px solid rgba(212,175,55,0.25);
            border-radius: 24px; padding: 40px 30px; backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4); position: relative; overflow: hidden;
        }
        .section-title {
            font-family: 'Lalezar', cursive; font-size: 2.2rem; color: var(--gold);
            text-shadow: 0 0 20px rgba(212,175,55,0.6); margin-bottom: 25px; text-align: center;
        }

        .reveal { opacity: 0; transform: translateY(30px); transition: 1s; }
        .reveal.active { opacity: 1; transform: none; }

        .heart-drop {
            position: fixed; top: -40px; z-index: 9999; pointer-events: none;
            animation: heartFall linear forwards;
        }
        @keyframes heartFall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }

        /* سایر استایل‌ها */
        .activity-log { max-height: 400px; overflow-y: auto; font-size: 0.9rem; }
        .log-entry { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        @media (max-width: 768px) {
            .navbar { top: auto !important; bottom: 10px; }
            .section-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<script>
    // ==================== FIREBASE ====================
    const firebaseConfig = {
        apiKey: "AIzaSyDsqisH5TT77Wq1qJ8_gljRs7wnzH8h0PQ",
        authDomain: "niyayesh-universe.firebaseapp.com",
        projectId: "niyayesh-universe",
        storageBucket: "niyayesh-universe.firebasestorage.app",
        messagingSenderId: "675804346928",
        appId: "1:675804346928:web:8e8c33f7a26d2824340bf5"
    };
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ==================== STATE ====================
    let currentUser = null; // { username, role }
    const adminUsername = 'admin';
    const adminPassword = 'adminwiriper';

    // ==================== UTILS ====================
    function showNotif(msg) {
        const el = document.getElementById('custom-alert');
        document.getElementById('custom-alert-msg').innerText = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function logActivity(username, action) {
        db.collection('activities').add({
            username, action, timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
    }

    // ==================== AUTH ====================
    function switchAuthTab(tab) {
        document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
        document.getElementById('signup-form').style.display = tab === 'signup' ? 'block' : 'none';
        document.getElementById('login-tab-btn').classList.toggle('active', tab === 'login');
        document.getElementById('signup-tab-btn').classList.toggle('active', tab === 'signup');
    }

    async function handleSignup() {
        const username = document.getElementById('signup-username').value.trim();
        const password = document.getElementById('signup-password').value.trim();
        if (!username || !password) return showNotif('لطفاً همه فیلدها را پر کنید');
        const userRef = db.collection('users').doc(username);
        const doc = await userRef.get();
        if (doc.exists) return showNotif('این نام کاربری قبلاً ثبت شده');
        await userRef.set({ password, role: 'user' });
        showNotif('حساب با موفقیت ساخته شد، حالا وارد شوید');
        switchAuthTab('login');
    }

    async function handleLogin() {
        const username = document.getElementById('login-username').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!username || !password) return showNotif('نام کاربری و رمز را وارد کنید');
        const userDoc = await db.collection('users').doc(username).get();
        if (!userDoc.exists) return showNotif('کاربری با این نام یافت نشد');
        const userData = userDoc.data();
        if (userData.password !== password) return showNotif('رمز عبور اشتباه است');
        currentUser = { username, role: userData.role || (username === adminUsername ? 'admin' : 'user') };
        document.getElementById('login-zone').style.display = 'none';
        if (currentUser.role === 'admin') document.getElementById('nav-admin').style.display = 'inline-block';
        if (currentUser.username === 'niyayesh') document.getElementById('nav-chat').style.display = 'inline-block';
        startEmpire();
    }

    async function enterGuest() {
        currentUser = { username: 'guest', role: 'guest' };
        document.getElementById('login-zone').style.display = 'none';
        startEmpire();
    }

    // ==================== BUILD SECTIONS ====================

                <div style="display:flex; gap:5px;"><input id="chat-input-field"><button class="action-btn primary-btn" style="width:auto;" onclick="sendPrivateMsg()">ارسال</button></div>

            </div>
            <div class="section-card reveal" id="music">

                <iframe id="music-iframe" src="https://open.spotify.com/embed/track/2QjOHCTQ1Jl3zawyYOpxh6" width="100%" height="80"></iframe>
                <div style="display:flex; gap:5px; justify-content:center; margin-top:5px;">

            <div class="section-card reveal" id="promises">

                <textarea id="promise-input" placeholder="وعده‌ات به ملکه..."></textarea>
                <button class="action-btn primary-btn" style="width:auto; margin-top:10px;" onclick="addPromise()">ثبت</button>
                <div id="promises-list" style="margin-top:15px;"></div>
            </div>
            <div class="section-card reveal" id="loveclock">

            </div>
            <div class="section-card reveal" id="interests">
                <div class="section-title">🎯 علایق ما</div>

                    <div class="glass-card"><strong>نیایش:</strong> Vampire Diaries 🧛‍♀️، معماری 🏛️</div>

                <div>نیایش: ۱۵ شهریور ۱۳۸۹ (شمارش معکوس: <span id="cd-niyayesh"></span>)</div>

    // ==================== INITIALIZATION ====================
    function startEmpire() {
        buildSections();
        document.getElementById('main').style.display = 'block';
        setTimeout(() => document.getElementById('main').style.opacity = '1', 100);
        document.getElementById('navbar').classList.add('show');
        // فعال‌سازی بخش‌ها
        startTypewriter();
        initResonance();
        initGalaxy();
        initWheel();
        listenGrimoire();
        listenChat();
        listenPromises();
        listenPosts();
        initArcade();
        startLoveClock();
        startBirthdayCountdowns();
        if (currentUser && currentUser.role === 'admin') {
            document.getElementById('admin').style.display = 'block';
            listenActivities();
        }
        if (currentUser && currentUser.username === 'niyayesh') {
            document.getElementById('chat').style.display = 'block';
        }
        window.addEventListener('scroll', revealOnScroll);
        revealOnScroll();
    }

    // ==================== FUNCTIONS ====================
    function startTypewriter() {
        const text = "نیایش عزیزم، ملکهٔ قلب من...\nاز لحظه‌ای که نگاهت را دیدم، تاج سلطنتم بر سرم سنگینی می‌کند مگر آنکه تو کنارم باشی...";
        let i = 0;
        const el = document.getElementById('typed-text');
        if (!el) return;
        el.innerHTML = '';
        function type() {
            if (i < text.length) {
                el.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                i++;
                setTimeout(type, 40);
            }
        }
        type();
    }

    function resonateHearts() {
        launchHeartRain();
        const scoreEl = document.getElementById('resonance-score');
        let score = parseInt(scoreEl.innerText) || 0;
        score = Math.min(100, score + Math.floor(Math.random()*5)+3);
        scoreEl.innerText = score + '%';
        db.collection('state').doc('resonance').set({ score }, { merge: true });
        logActivity(currentUser.username, 'هم‌نوایی قلب');
    }

    function initGalaxy() {
        const canvas = document.getElementById('galaxyCanvas');
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 200;
        const ctx = canvas.getContext('2d');
        let particles = Array.from({length:40}, ()=>({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height,
            vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4
        }));
        function draw() {
            ctx.fillStyle = 'rgba(10,17,40,0.4)';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x<0||p.x>canvas.width) p.vx*=-1;
                if(p.y<0||p.y>canvas.height) p.vy*=-1;
                ctx.beginPath();
                ctx.arc(p.x,p.y,2,0,Math.PI*2);
                ctx.fillStyle = '#f0d58c';
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    }

    let wheelAngle = 0;
    function initWheel() {
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const items = ["💋 بوسه", "🏎️ سفر", "🥀 رز", "💍 حلقه", "🫂 آغوش", "✨ آرزو"];
        function draw() {
            ctx.clearRect(0,0,280,280);
            items.forEach((item,i)=>{
                const angle = wheelAngle + i*(Math.PI*2/items.length);
                ctx.beginPath();
                ctx.arc(140,140,120, angle, angle+Math.PI*2/items.length);
                ctx.fillStyle = i%2===0?'#d4af37':'#1a2a6c';
                ctx.fill();
                ctx.fillStyle = 'white';
                ctx.font = '14px Vazirmatn';
                ctx.save();
                ctx.translate(140,140);
                ctx.rotate(angle+Math.PI/items.length);
                ctx.fillText(item, 80, 5);
                ctx.restore();
            });
        }
        draw();
        window.spinTheWheel = () => {
            const target = wheelAngle + (Math.floor(Math.random()*5)+5)*Math.PI*2;
            const start = Date.now(), dur = 3000;
            function anim() {
                const p = Math.min((Date.now()-start)/dur,1);
                wheelAngle += (target-wheelAngle)*0.08;
                draw();
                if(p<1) requestAnimationFrame(anim);
                else logActivity(currentUser.username, 'چرخاندن گردونه');
            }
            anim();
        };
        setInterval(draw, 50);
    }

    // تولدها
    function startBirthdayCountdowns() {
        function update() {
            const now = Date.now();
            const mobinBd = new Date(now.getFullYear(), 2, 16).getTime(); // 25 Esfand = ~March 16
            const niyayeshBd = new Date(now.getFullYear(), 8, 6).getTime(); // 15 Shahrivar = ~Sep 6
            if (now > mobinBd) mobinBd.setFullYear(now.getFullYear()+1);
            if (now > niyayeshBd) niyayeshBd.setFullYear(now.getFullYear()+1);
            document.getElementById('cd-mobin').innerText = formatDistance(mobinBd - now);
            document.getElementById('cd-niyayesh').innerText = formatDistance(niyayeshBd - now);
        }
        setInterval(update, 1000);
        update();
    }
    function formatDistance(ms) {
        const d = Math.floor(ms/86400000);
        const h = Math.floor((ms%86400000)/3600000);
        const m = Math.floor((ms%3600000)/60000);
        const s = Math.floor((ms%60000)/1000);
        return `${d} روز ${h} ساعت ${m} دقیقه ${s} ثانیه`;
    }

    // آرکید ساده
    let playerX = 50, enemyX = 300;
    function initArcade() {
        const canvas = document.getElementById('tekkenCanvas');
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = 250;
        const ctx = canvas.getContext('2d');
        function loop() {
            ctx.fillStyle = '#111';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = 'gold';
            ctx.fillRect(playerX, 150, 30, 60);
            ctx.fillStyle = 'crimson';
            ctx.fillRect(enemyX, 150, 30, 60);
            requestAnimationFrame(loop);
        }
        loop();
        window.movePlayer = (d) => playerX = Math.min(Math.max(playerX+d*30, 0), canvas.width-30);
        window.playerAttack = () => {
            if(Math.abs(playerX - enemyX) < 80) showNotif('ضربه زدی!');
            logActivity(currentUser.username, 'حمله در آرکید');
        };
    }

    function startLoveClock() {
        const start = new Date('2025-03-21').getTime();
        setInterval(() => {
            const diff = Date.now() - start;
            if(diff<0) return;
            const d = Math.floor(diff/86400000);
            const h = Math.floor((diff%86400000)/3600000);
            const m = Math.floor((diff%3600000)/60000);
            const s = Math.floor((diff%60000)/1000);
            document.getElementById('love-days').innerText = d;
            document.getElementById('love-hours').innerText = h;
            document.getElementById('love-minutes').innerText = m;
            document.getElementById('love-seconds').innerText = s;
        }, 1000);
    }

    function revealOnScroll() {
        document.querySelectorAll('.reveal').forEach(el => {
            if(el.getBoundingClientRect().top < window.innerHeight-50) el.classList.add('active');
        });
