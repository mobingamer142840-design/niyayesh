<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyDsqisH5TT77Wq1qJ8_gljRs7wnzH8h0PQ",
    authDomain: "niyayesh-universe.firebaseapp.com",
    projectId: "niyayesh-universe",
    storageBucket: "niyayesh-universe.firebasestorage.app",
    messagingSenderId: "675804346928",
    appId: "1:675804346928:web:8e8c33f7a26d2824340bf5",
    measurementId: "G-5X7BKVZBNN"
  };

  // مقداردهی اولیه
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // تابع برای خواندن داده‌ها
  async function loadData() {
    try {
      const doc = await db.collection("website_data").doc("config").get();
      if (doc.exists) {
        const data = doc.data();
        // اعمال تغییرات
        if(document.querySelector("#tvd-sec iframe")) {
            document.querySelector("#tvd-sec iframe").src = data.tvd_video_url;
        }
        if(document.getElementById("porsche")) {
            document.getElementById("porsche").src = data.porsche_image_url;
        }
        console.log("داده‌ها با موفقیت لود شدند!");
      }
    } catch (e) {
      console.error("خطا در خواندن داده: ", e);
    }
  }

  // اجرای تابع
  window.onload = loadData;
</script>
